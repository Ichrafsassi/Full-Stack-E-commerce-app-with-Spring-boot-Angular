
    <header class="navbar">
      <a routerLink="/" class="brand" (click)="closeMenu()">
        <span class="brand-mark">&lt;/&gt;</span>
        <span class="brand-text">NERD'S TECH</span>
      </a>

      <button type="button" class="menu-toggle" aria-label="Open menu" (click)="toggleMenu()">
        <span></span><span></span><span></span>
      </button>

      <div class="nav-panel" [class.open]="menuOpen()">
        <nav class="nav-main">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
          <a routerLink="/products" routerLinkActive="active" (click)="closeMenu()">Shop</a>
          <a routerLink="/deals" routerLinkActive="active" (click)="closeMenu()">Deals</a>
          <a routerLink="/builds" routerLinkActive="active" (click)="closeMenu()">Builds</a>
          <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
          <a routerLink="/support" routerLinkActive="active" (click)="closeMenu()">Support</a>
          @if (auth.isLoggedIn()) {
            <a routerLink="/orders" routerLinkActive="active" (click)="closeMenu()">Orders</a>
          }
          @if (auth.isAdmin()) {
            <a routerLink="/admin" routerLinkActive="active" class="admin-link" (click)="closeMenu()">Admin</a>
          }
        </nav>

        <div class="actions">
          <a routerLink="/cart" routerLinkActive="active" class="cart-link" (click)="closeMenu()" aria-label="Cart">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span>Cart</span>
          </a>
          @if (auth.isLoggedIn()) {
            <span class="user">{{ auth.user()?.firstName }}</span>
            <button type="button" class="neo-btn ghost" (click)="auth.logout()">Logout</button>
          } @else {
            <a routerLink="/login" class="neo-btn ghost" (click)="closeMenu()">Sign in</a>
            <a routerLink="/register" class="neo-btn primary" (click)="closeMenu()">Register</a>
          }
        </div>
      </div>
    </header>
