
    <div class="admin-panel">
      <div class="panel-head">
        <h2>Users</h2>
      </div>
      @if (flash()) {
        <p class="admin-flash" [class.err]="flashErr()" [class.ok]="!flashErr()">{{ flash() }}</p>
      }
      <form class="admin-form" (ngSubmit)="save()">
        <input class="neo-input" [(ngModel)]="form.email" name="email" type="email" placeholder="Email" required />
        <input class="neo-input" [(ngModel)]="form.password" name="password" type="password" placeholder="Password" [required]="!editId" />
        <input class="neo-input" [(ngModel)]="form.firstName" name="fn" placeholder="First name" required />
        <input class="neo-input" [(ngModel)]="form.lastName" name="ln" placeholder="Last name" required />
        <select class="neo-select" [(ngModel)]="form.role" name="role">
          <option value="USER">USER</option>
          <option value="ADMIN">ADMIN</option>
        </select>
        <label class="check"><input type="checkbox" [(ngModel)]="form.enabled" name="en" /> Enabled</label>
        <div class="form-actions">
          <button type="submit" class="neo-btn primary">{{ editId ? 'Update' : 'Create' }}</button>
          @if (editId) { <button type="button" class="neo-btn ghost" (click)="reset()">Cancel</button> }
        </div>
      </form>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>Email</th><th>Name</th><th>Role</th><th>Status</th><th></th></tr>
          </thead>
          <tbody>
            @for (u of users(); track u.id) {
              <tr>
                <td>{{ u.email }}</td>
                <td>{{ u.firstName }} {{ u.lastName }}</td>
                <td><span class="badge role" [class.admin]="u.role === 'ADMIN'">{{ u.role }}</span></td>
                <td><span class="badge status" [class.disabled]="u.enabled === false">{{ u.enabled !== false ? 'Active' : 'Disabled' }}</span></td>
                <td class="actions">
                  <button type="button" class="btn-edit" (click)="edit(u)">Edit</button>
                  <button type="button" [class]="u.enabled !== false ? 'btn-deactivate' : 'btn-activate'" (click)="toggleEnabled(u)">
                    {{ u.enabled !== false ? 'Deactivate' : 'Activate' }}
                  </button>
                  @if (u.role !== 'ADMIN') {
                    <button type="button" class="btn-delete" (click)="del(u)">Delete</button>
                  }
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
