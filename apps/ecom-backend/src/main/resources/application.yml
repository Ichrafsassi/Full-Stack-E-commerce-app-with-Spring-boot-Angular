spring:
  application:
    name: ecom-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/ecom_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your-super-secret-key-for-jwt-token-generation-make-it-long-enough-256-bits-minimum
  expiration: 86400000

logging:
  level:
    com.ecom: DEBUG
    org.springframework.web: INFO
